<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>DART GENXL</title>
    <meta property="of:version" content="vNext" />
    <meta property="of:accepts:xmtp" content="2024-02-01" />
    <meta name="farcaster:miniapp" content="true" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: monospace; padding: 20px; }
        .container { background: #111116; border-radius: 24px; padding: 20px; max-width: 720px; width: 100%; }
        canvas { display: block; margin: 0 auto; border-radius: 16px; width: 100%; height: auto; background: #050508; cursor: pointer; }
        .info-panel { margin-top: 16px; background: #0d0d12; border-radius: 16px; padding: 14px; }
        .traits-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
        .trait-item { font-size: 10px; color: #8888aa; font-family: monospace; }
        .trait-item span:first-child { color: #666688; }
        .trait-item span:last-child { color: #e8e8f0; font-weight: 500; }
        .controls { margin-top: 16px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input, button { background: #0d0d12; color: #e8e8f0; border: 1px solid rgba(255,255,255,0.1); padding: 8px 14px; border-radius: 40px; font-family: monospace; cursor: pointer; }
        button:hover { background: #1a1a24; border-color: #aa88ff; }
        .status { margin-top: 14px; font-size: 9px; color: #666688; text-align: center; }
        .cursor { display: inline-block; width: 6px; height: 10px; background: #aa88ff; animation: blink 1s step-end infinite; margin-left: 4px; border-radius: 1px; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
        .live-badge { position: fixed; bottom: 10px; right: 10px; background: #ffaa5520; color: #ffaa55; padding: 4px 12px; border-radius: 20px; font-size: 9px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="artCanvas" width="640" height="640"></canvas>
        <div class="info-panel">
            <div class="traits-grid" id="traitsGrid">
                <div class="trait-item"><span>ENGINE:</span> <span id="traitEngine">—</span></div>
                <div class="trait-item"><span>VARIANT:</span> <span id="traitEngineVar">—</span></div>
                <div class="trait-item"><span>RARITY:</span> <span id="traitRarity">—</span></div>
                <div class="trait-item"><span>ARCHETYPE:</span> <span id="traitArchetype">—</span></div>
                <div class="trait-item"><span>ANCHOR:</span> <span id="traitAnchor">—</span></div>
                <div class="trait-item"><span>DRIVER:</span> <span id="traitDriver">—</span></div>
                <div class="trait-item"><span>SPATIAL:</span> <span id="traitSpatial">—</span></div>
                <div class="trait-item"><span>FAILURE:</span> <span id="traitFailure">—</span></div>
                <div class="trait-item"><span>ANOMALY:</span> <span id="traitAnomaly">—</span></div>
                <div class="trait-item"><span>MICRO:</span> <span id="traitMicro">—</span></div>
                <div class="trait-item"><span>EVENT SCORE:</span> <span id="traitES">—</span></div>
                <div class="trait-item"><span>CANONICAL INT:</span> <span id="traitCanonicalInt">—</span></div>
            </div>
        </div>
        <div class="controls">
            <input type="text" id="tokenInput" placeholder="TOKEN ID" value="1">
            <input type="text" id="hashInput" placeholder="TX HASH" value="0xminiapp">
            <button id="renderBtn">RENDER</button>
            <button id="randomBtn">RANDOM</button>
            <button id="aboutBtn">ABOUT</button>
        </div>
        <div class="status" id="status">DART GENXL READY <span class="cursor"></span></div>
    </div>
    <div class="live-badge">⚡ LIVE PRESSURE</div>
    
    <script type="module">
        import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';
        
        // Engine will be loaded from global scope
        // Wait for engine to be available
        function waitForEngine() {
            return new Promise((resolve) => {
                if (typeof DartHLGEN !== 'undefined') {
                    resolve();
                    return;
                }
                const checkInterval = setInterval(() => {
                    if (typeof DartHLGEN !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 100);
            });
        }
        
        async function start() {
            // Wait for engine.js to load
            await waitForEngine();
            console.log('Engine loaded');
            
            const canvas = document.getElementById('artCanvas');
            const tokenInput = document.getElementById('tokenInput');
            const hashInput = document.getElementById('hashInput');
            const renderBtn = document.getElementById('renderBtn');
            const randomBtn = document.getElementById('randomBtn');
            const aboutBtn = document.getElementById('aboutBtn');
            const statusDiv = document.getElementById('status');
            
            const urlParams = new URLSearchParams(window.location.search);
            const tokenIdParam = urlParams.get('tid') || '1';
            tokenInput.value = tokenIdParam;
            
            let currentSession = null;
            
            function updateTraitsUI(result) {
                if (!result || !result.traits) return;
                const t = result.traits;
                document.getElementById('traitEngine').textContent = t.engineType || '?';
                document.getElementById('traitEngineVar').textContent = t.engineVariant || '?';
                document.getElementById('traitRarity').textContent = t.rarityClass || '?';
                document.getElementById('traitArchetype').textContent = t.archetype || '?';
                document.getElementById('traitAnchor').textContent = t.anchorForm || '?';
                document.getElementById('traitDriver').textContent = t.primaryDriver || '?';
                document.getElementById('traitSpatial').textContent = t.spatialBehavior || '?';
                document.getElementById('traitFailure').textContent = t.failureMode || '?';
                document.getElementById('traitAnomaly').textContent = t.anomalyClass || 'None';
                document.getElementById('traitMicro').textContent = t.microEvent || 'None';
                document.getElementById('traitES').textContent = result.eventScore || '0';
                const canonicalInt = document.getElementById('traitCanonicalInt');
                if (canonicalInt) canonicalInt.textContent = result.canonicalIntensity ? result.canonicalIntensity.toFixed(3) : '—';
            }
            
            function startLiveMode() {
                const tokenId = tokenInput.value.trim() || '1';
                const txHash = hashInput.value.trim() || '0xminiapp';
                statusDiv.innerHTML = 'LIVE MODE ACTIVE';
                
                if (currentSession) {
                    currentSession.stop();
                }
                
                try {
                    const session = DartHLGEN.createLiveSession(tokenId, txHash);
                    currentSession = session;
                    session.startAnimation(canvas);
                    
                    // Update UI with canonical traits
                    const canonical = session.getCanonical();
                    updateTraitsUI(canonical);
                    
                    statusDiv.innerHTML = 'LIVE — PRESSURE SENSITIVE';
                } catch(e) {
                    console.error(e);
                    statusDiv.innerHTML = 'ERROR: ' + e.message;
                    // Fallback to canonical
                    const result = DartHLGEN.renderCanonical(tokenId, txHash);
                    DartHLGEN.drawToCanvas(canvas, result);
                    updateTraitsUI(result);
                    statusDiv.innerHTML = 'CANONICAL MODE';
                }
            }
            
            function randomToken() {
                const randomId = Math.floor(Math.random() * 9999) + 1;
                tokenInput.value = randomId;
                startLiveMode();
                const url = new URL(window.location);
                url.searchParams.set('tid', randomId);
                window.history.pushState({}, '', url);
            }
            
            function openAbout() { 
                window.open('about.html', '_blank'); 
            }
            
            renderBtn.onclick = startLiveMode;
            randomBtn.onclick = randomToken;
            aboutBtn.onclick = openAbout;
            tokenInput.onkeypress = (e) => { if (e.key === 'Enter') startLiveMode(); };
            
            // Start live mode
            startLiveMode();
            
            // Tell Farcaster the app is ready
            await sdk.actions.ready();
            console.log('✅ Mini App ready, splash screen hidden');
        }
        
        start();
    </script>
    <script src="engine.js"></script>
</body>
</html>
